<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DND战利品随机器</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', '宋体', serif;
        }

        /* 背景和基础样式 */
        body {
            background-color: #2d1f14;
            background-image: 
                linear-gradient(rgba(45, 31, 20, 0.6), rgba(45, 31, 20, 0.6)),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #d4c5a9;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* 主容器 */
        。container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(101, 67, 33, 0.6);
            border: 3px solid #b8860b;
            border-radius: 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            padding: 25px;
            position: relative;
        }

        /* 容器浮雕边框效果 */
        .container::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(184, 134, 11, 0.3);
            pointer-events: none;
        }

        /* 标题样式 */
        h1 {
            text-align: center;
            color: #e6d5b8;
            margin-bottom: 25px;
            font-size: 2.2em;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            border-bottom: 2px dashed #8b6914;
            padding-bottom: 15px;
        }

        /* 词库选择区域 */
        。library-section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: rgba(77, 51, 25, 0.4);
            border: 1px solid #8b6914;
        }

        .library-section label {
            font-weight: bold;
            margin-right: 10px;
            color: #e6d5b8;
        }

        。library-section select {
            background-color: #654321;
            color: #d4c5a9;
            border: 1px solid #b8860b;
            padding: 8px 12px;
            border-radius: 0;
            font-size: 1em;
            min-width: 200px;
        }

        。library-section select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* 控制区域 */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* 通用面板样式 */
        .panel {
            background-color: rgba(77, 51, 25, 0.4);
            border: 1px solid #8b6914;
            padding: 15px;
        }

        .panel h3 {
            color: #e6d5b8;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 1px dashed #8b6914;
            padding-bottom: 8px;
        }

        /* 数量输入 */
        .quantity-control {
            margin-bottom: 20px;
        }

        .quantity-control label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        。quantity-control input {
            width: 100%;
            background-color: #654321;
            color: #d4c5a9;
            border: 1px solid #b8860b;
            padding: 10px;
            border-radius: 0;
            font-size: 1em;
        }

        .quantity-control input:focus {
            outline: none;
            border-color: #ffd700;
        }

        /* 按钮组样式 */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* 基础按钮样式 */
        .filter-btn {
            background-color: #654321;
            color: #d4c5a9;
            border: 2px solid #b8860b;
            padding: 8px 16px;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }

        .filter-btn:hover {
            background-color: #8b5a2b;
            border-color: #ffd700;
            color: #e6d5b8;
        }

        .filter-btn.active {
            background-color: #b8860b;
            color: #2d1f14;
            border-color: #ffd700;
            font-weight: bold;
        }

        /* 全选/取消按钮 */
        。action-btn {
            background-color: #5a3d1f;
            color: #d4c5a9;
            border: 1px solid #8b6914;
            padding: 6px 12px;
            border-radius: 0;
            cursor: pointer;
            font-size: 0.85em;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .action-btn:hover {
            background-color: #7a522d;
            border-color: #b8860b;
        }

        /* 当前选择提示 */
        .selection-info {
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(45, 31, 20, 0.5);
            border: 1px dashed #8b6914;
            font-size: 0.9em;
            color: #c9b896;
        }

        。selection-info strong {
            color: #e6d5b8;
        }

        /* 生成按钮 */
        .generate-btn {
            display: block;
            width: 100%;
            background-color: #8b6914;
            color: #2d1f14;
            border: 3px solid #b8860b;
            padding: 15px;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        .generate-btn:hover {
            background-color: #b8860b;
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .generate-btn:disabled {
            background-color: #5a4321;
            border-color: #8b6914;
            color: #8b7355;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 30px;
            font-size: 1.2em;
            color: #b8860b;
        }

        /* 结果区域 */
        .results {
            background-color: rgba(77, 51, 25, 0.4);
            border: 1px solid #8b6914;
            padding: 20px;
        }

        .results h2 {
            color: #e6d5b8;
            margin-bottom: 20px;
            font-size: 1.6em;
            border-bottom: 2px dashed #8b6914;
            padding-bottom: 10px;
        }

        /* 战利品卡片 */
        .item-card {
            background-color: rgba(101, 67, 33, 0.5);
            border: 1px solid #8b6914;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: var(--rarity-color, #8b8b8b);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            border-bottom: 1px dashed #654321;
            padding-bottom: 8px;
        }

        .item-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #e6d5b8;
        }

        .item-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #c9b896;
        }

        。item-rarity {
            font-weight: bold;
            color: var(--rarity-color, #8b8b8b);
        }

        .item-description {
            margin-top: 10px;
            line-height: 1.7;
            color: #d4c5a9;
        }

        .item-source {
            margin-top: 10px;
            font-size: 0.85em;
            color: #9a8b6e;
            text-align: right;
            border-top: 1px dotted #654321;
            padding-top: 5px;
        }

        /* 稀有度颜色定义 */
        .rarity-common { --rarity-color: #8b8b8b; }
        。rarity-uncommon { --rarity-color: #1eff00; }
        .rarity-rare { --rarity-color: #0070dd; }
        。rarity-very-rare { --rarity-color: #a335ee; }
        .rarity-legendary { --rarity-color: #ff8000; }
        .rarity-artifact { --rarity-color: #e6cc80; }
        .rarity-unknown { --rarity-color: #9d9d9d; }
        .rarity-unknown-magic { --rarity-color: #ff4040; }

        /* 错误提示 */
        .error {
            color: #ff6b6b;
            padding: 15px;
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            margin-bottom: 15px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                justify-content: center;
            }
            
            .item-header {
                flex-direction: column;
                gap: 5px;
            }
            
            .item-meta {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 战利品随机器</h1>
        
        <!-- 词库选择区域 -->
        <div class="library-section">
            <label for="library-select">当前词库：</label>
            <select id="library-select">
                <option value="">正在加载词库...</option>
            </select>
            <span id="library-status" style="margin-left: 15px;"></span>
        </div>

        <!-- 控制区域 -->
        <div class="controls">
            <!-- 左侧：稀有度选择 -->
            <div class="panel">
                <h3>📜 稀有度选择</h3>
                <div id="rarity-buttons" class="button-group">
                    <!-- 动态生成稀有度按钮 -->
                </div>
                <div>
                    <button class="action-btn" id="select-all-rarities">全选稀有度</button>
                    <button class="action-btn" id="deselect-all-rarities">取消全选</button>
                </div>
            </div>

            <!-- 右侧：类型选择 -->
            <div class="panel">
                <h3>⚔️ 物品类型选择</h3>
                <div id="type-buttons" class="button-group">
                    <!-- 动态生成类型按钮 -->
                </div>
                <div>
                    <button class="action-btn" id="select-all-types">全选类型</button>
                    <button class="action-btn" id="deselect-all-types">取消全选</button>
                </div>
            </div>
        </div>

        <!-- 数量控制 -->
        <div class="quantity-control">
            <label for="quantity-input">生成数量：</label>
            <input type="number" id="quantity-input" min="1" max="100" value="1" placeholder="请输入要生成的战利品数量">
        </div>

        <!-- 当前选择提示 -->
        <div class="selection-info">
            <strong>当前选择：</strong>
            <span id="current-selection">请选择稀有度和类型</span>
        </div>

        <!-- 生成按钮 -->
        <button class="generate-btn" id="generate-btn" disabled>🔮 生成战利品</button>

        <!-- 结果区域 -->
        <div class="results">
            <h2>📦 生成结果</h2>
            <div id="results-container">
                <p>点击上方按钮生成战利品</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局配置 ====================
        const CONFIG = {
            // GitHub仓库基础URL（部署时请修改为你的实际地址）
            GITHUB_BASE_URL: './词条数据库',
            
            // 预定义稀有度列表（与数据库保持一致）
            RARITIES: [
                { id: 'common', name: '常见', class: 'rarity-common' },
                { id: 'uncommon', name: '非常见', class: 'rarity-uncommon' },
                { id: 'rare', name: '珍稀', class: 'rarity-rare' },
                { id: 'very-rare', name: '非常珍稀', class: 'rarity-very-rare' },
                { id: 'legendary', name: '传说', class: 'rarity-legendary' },
                { id: 'artifact', name: '神器', class: 'rarity-artifact' },
                { id: 'unknown', name: '不明', class: 'rarity-unknown' },
                { id: 'unknown-magic', name: '不明（魔法）', class: 'rarity-unknown-magic' }
            ],
            
            // 预定义基础类型（数据库可扩展）
            DEFAULT_TYPES: ['武器', '防具', '道具', '消耗品', '材料', '工具'],
            
            // 最大生成数量
            MAX_QUANTITY: 100
        };

        // ==================== 全局状态 ====================
        const state = {
            // 已加载的词库列表
            libraries: [],
            // 当前选中的词库
            currentLibrary: null,
            // 已加载的所有物品数据
            items: [],
            // 选中的稀有度ID集合
            selectedRarities: new Set(),
            // 选中的类型集合
            selectedTypes: new Set(),
            // 所有可用类型（从JSON文件动态获取）
            availableTypes: new Set(CONFIG.DEFAULT_TYPES),
            // 是否正在加载数据
            isLoading: false
        };

        // ==================== DOM元素引用 ====================
        const elements = {
            librarySelect: document.getElementById('library-select'),
            libraryStatus: document.getElementById('library-status'),
            rarityButtons: document.getElementById('rarity-buttons'),
            typeButtons: document.getElementById('type-buttons'),
            selectAllRarities: document.getElementById('select-all-rarities'),
            deselectAllRarities: document.getElementById('deselect-all-rarities'),
            selectAllTypes: document.getElementById('select-all-types'),
            deselectAllTypes: document.getElementById('deselect-all-types'),
            quantityInput: document.getElementById('quantity-input'),
            currentSelection: document.getElementById('current-selection'),
            generateBtn: document.getElementById('generate-btn'),
            resultsContainer: document.getElementById('results-container')
        };

        // ==================== 工具函数 ====================
        
        /**
         * 显示加载状态
         * @param {string} message 加载消息
         */
        function showLoading(message) {
            elements.resultsContainer.innerHTML = `<div class="loading">${message}</div>`;
        }

        /**
         * 显示错误信息
         * @param {string} message 错误消息
         */
        function showError(message) {
            elements.resultsContainer.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        /**
         * 更新当前选择提示
         */
        function updateSelectionInfo() {
            const rarityNames = Array.from(state.selectedRarities)
                .map(id => CONFIG.RARITIES.find(r => r.id === id)?.name || id)
                .join('、');
            
            const typeNames = Array.from(state.selectedTypes).join('、');
            
            if (state.selectedRarities.size === 0 && state.selectedTypes.size === 0) {
                elements.currentSelection.textContent = '请选择至少一种稀有度和类型';
            } else if (state.selectedRarities.size === 0) {
                elements.currentSelection.textContent = `请选择至少一种稀有度 | 已选类型：${typeNames || '无'}`;
            } else if (state.selectedTypes.size === 0) {
                elements.currentSelection.textContent = `已选稀有度：${rarityNames || '无'} | 请选择至少一种类型`;
            } else {
                elements.currentSelection.textContent = `已选稀有度：${rarityNames} | 已选类型：${typeNames}`;
            }
            
            // 更新生成按钮状态
            elements.generateBtn.disabled = state.selectedRarities.size === 0 || 
                                           state.selectedTypes.size === 0 || 
                                           state.items.length === 0 ||
                                           state.isLoading;
        }

        /**
         * 从数组中随机抽取n个不重复元素
         * @param {Array} array 源数组
         * @param {number} n 抽取数量
         * @returns {Array} 随机抽取的元素数组
         */
        function getRandomItems(array, n) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, Math.min(n, shuffled.length));
        }

        // ==================== UI渲染函数 ====================

        /**
         * 渲染稀有度按钮
         */
        function renderRarityButtons() {
            elements.rarityButtons.innerHTML = '';
            
            CONFIG.RARITIES.forEach(rarity => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.dataset.rarityId = rarity.id;
                button.textContent = rarity.name;
                
                if (state.selectedRarities.has(rarity.id)) {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    if (state.selectedRarities.has(rarity.id)) {
                        state.selectedRarities.delete(rarity.id);
                        button.classList.remove('active');
                    } else {
                        state.selectedRarities.add(rarity.id);
                        button.classList.add('active');
                    }
                    updateSelectionInfo();
                });
                
                elements.rarityButtons.appendChild(button);
            });
        }

        /**
         * 渲染类型按钮（根据可用类型动态生成）
         */
        function renderTypeButtons() {
            elements.typeButtons.innerHTML = '';
            
            // 转换为数组并排序
            const types = Array.from(state.availableTypes).sort();
            
            types.forEach(type => {
                const button = document.createElement('button');
                button.className = 'filter-btn';
                button.dataset.type = type;
                button.textContent = type;
                
                if (state.selectedTypes.has(type)) {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    if (state.selectedTypes.has(type)) {
                        state.selectedTypes.delete(type);
                        button.classList.remove('active');
                    } else {
                        state.selectedTypes.add(type);
                        button.classList.add('active');
                    }
                    updateSelectionInfo();
                });
                
                elements.typeButtons.appendChild(button);
            });
        }

        /**
         * 渲染词库选择下拉框
         */
        function renderLibrarySelect() {
            elements.librarySelect.innerHTML = '';
            
            if (state.libraries.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '未找到可用词库';
                elements.librarySelect.appendChild(option);
                return;
            }
            
            state.libraries.forEach(library => {
                const option = document.createElement('option');
                option.value = library;
                option.textContent = library;
                elements.librarySelect.appendChild(option);
            });
            
            // 默认选中第一个词库
            if (state.libraries.length > 0) {
                elements.librarySelect.value = state.libraries[0];
                loadLibrary(state.libraries[0]);
            }
        }

        /**
         * 渲染单个物品卡片
         * @param {Object} item 物品数据
         * @returns {HTMLElement} 物品卡片元素
         */
        function renderItemCard(item) {
            const card = document.createElement('div');
            card.className = 'item-card';
            
            // 获取稀有度信息
            const rarityInfo = CONFIG.RARITIES.find(r => r.id === item.rarity) || 
                              { name: item.rarity, class: 'rarity-unknown' };
            
            card.classList.add(rarityInfo.class);
            
            card.innerHTML = `
                <div class="item-header">
                    <div class="item-name">${item.name || '未知物品'}</div>
                    <div class="item-meta">
                        <span class="item-rarity">${rarityInfo.name}</span>
                        <span>类型：${item.type || '未知'}</span>
                        <span>重量：${item.weight !== undefined ? item.weight + ' lb' : '未知'}</span>
                    </div>
                </div>
                <div class="item-description">${item.description || '暂无描述'}</div>
                <div class="item-source">来源：${item._source || '未知文件'}</div>
            `;
            
            return card;
        }

        /**
         * 渲染生成结果
         * @param {Array} items 生成的物品数组
         */
        function renderResults(items) {
            elements.resultsContainer.innerHTML = '';
            
            if (items.length === 0) {
                elements.resultsContainer.innerHTML = '<p>没有找到符合条件的物品</p>';
                return;
            }
            
            items.forEach(item => {
                const card = renderItemCard(item);
                elements.resultsContainer.appendChild(card);
            });
        }

        // ==================== 数据加载函数 ====================

        /**
         * 加载词库列表（读取词条数据库下的所有子文件夹）
         * 注意：由于浏览器安全限制，GitHub Pages需要通过特殊方式列出目录
         * 这里我们使用一个预定义的index.json文件来列出所有可用词库
         */
        async function loadLibraries() {
            try {
                const response = await fetch(`${CONFIG.GITHUB_BASE_URL}/index.json`);
                
                if (!response.ok) {
                    throw new Error(`无法加载词库列表: HTTP ${response.status}`);
                }
                
                const data = await response.json();
                state.libraries = data.libraries || [];
                
                renderLibrarySelect();
                
            } catch (error) {
                console.error('加载词库列表失败:', error);
                elements.libraryStatus.textContent = '❌ 加载词库列表失败';
                elements.librarySelect.innerHTML = '<option value="">加载失败</option>';
            }
        }

        /**
         * 加载指定词库的所有JSON文件
         * @param {string} libraryName 词库名称
         */
        async function loadLibrary(libraryName) {
            if (!libraryName) return;
            
            state.isLoading = true;
            elements.generateBtn.disabled = true;
            elements.libraryStatus.textContent = '⏳ 正在加载词库...';
            showLoading(`正在加载词库：${libraryName}...`);
            
            try {
                // 首先加载词库的index.json文件，获取该词库下的所有JSON文件列表
                const indexResponse = await fetch(`${CONFIG.GITHUB_BASE_URL}/${libraryName}/index.json`);
                
                if (!indexResponse.ok) {
                    throw new Error(`无法加载词库索引: HTTP ${indexResponse.status}`);
                }
                
                const indexData = await indexResponse.json();
                const files = indexData.files || [];
                
                if (files.length === 0) {
                    throw new Error('该词库下没有找到任何数据文件');
                }
                
                // 清空之前的数据
                state.items = [];
                state.availableTypes = new Set(CONFIG.DEFAULT_TYPES);
                
                // 并行加载所有JSON文件
                const loadPromises = files.map(async (filename) => {
                    try {
                        const fileResponse = await fetch(`${CONFIG.GITHUB_BASE_URL}/${libraryName}/${filename}`);
                        
                        if (!fileResponse.ok) {
                            console.error(`无法加载文件 ${filename}: HTTP ${fileResponse.status}`);
                            return [];
                        }
                        
                        const items = await fileResponse.json();
                        
                        // 为每个物品添加来源信息
                        items.forEach(item => {
                            item._source = filename;
                            
                            // 收集所有可用类型
                            if (item.type) {
                                state.availableTypes.add(item.type);
                            }
                        });
                        
                        return items;
                        
                    } catch (error) {
                        console.error(`加载文件 ${filename} 失败:`, error);
                        return [];
                    }
                });
                
                // 等待所有文件加载完成
                const results = await Promise.all(loadPromises);
                
                // 合并所有物品数据
                state.items = results.flat();
                
                // 更新状态
                state.currentLibrary = libraryName;
                
                // 重新渲染类型按钮
                renderTypeButtons();
                
                // 默认选中所有稀有度和类型
                state。selectedRarities = new Set(CONFIG.RARITIES.map(r => r.id));
                state.selectedTypes = new Set(state.availableTypes);
                
                // 重新渲染按钮状态
                renderRarityButtons();
                renderTypeButtons();
                
                // 更新选择提示
                updateSelectionInfo();
                
                elements.libraryStatus.textContent = `✅ 已加载 ${state.items.length} 个物品`;
                elements.resultsContainer.innerHTML = '<p>词库加载完成，点击生成按钮开始</p>';
                
            } catch (error) {
                console.error('加载词库失败:', error);
                showError(`加载词库失败: ${error.message}`);
                elements.libraryStatus.textContent = '❌ 加载词库失败';
            } finally {
                state.isLoading = false;
                updateSelectionInfo();
            }
        }

        // ==================== 核心功能函数 ====================

        /**
         * 生成随机战利品
         */
        function generateLoot() {
            const quantity = parseInt(elements.quantityInput.value) || 1;
            
            if (quantity < 1 || quantity > CONFIG.MAX_QUANTITY) {
                showError(`生成数量必须在 1 到 ${CONFIG.MAX_QUANTITY} 之间`);
                return;
            }
            
            if (state.selectedRarities.size === 0 || state.selectedTypes.size === 0) {
                showError('请至少选择一种稀有度和一种类型');
                return;
            }
            
            if (state.items.length === 0) {
                showError('没有可用的物品数据');
                return;
            }
            
            // 筛选符合条件的物品
            const filteredItems = state.items.filter(item => {
                return state.selectedRarities.has(item.rarity) && 
                       state.selectedTypes.has(item.type);
            });
            
            if (filteredItems.length === 0) {
                showError('没有找到符合所选稀有度和类型的物品');
                return;
            }
            
            // 随机抽取物品
            const randomItems = getRandomItems(filteredItems, quantity);
            
            // 渲染结果
            renderResults(randomItems);
        }

        // ==================== 事件绑定 ====================

        // 词库选择变更
        elements.librarySelect.addEventListener('change', (e) => {
            const libraryName = e.target.value;
            loadLibrary(libraryName);
        });

        // 全选稀有度
        elements.selectAllRarities.addEventListener('click', () => {
            state.selectedRarities = new Set(CONFIG.RARITIES.map(r => r.id));
            renderRarityButtons();
            updateSelectionInfo();
        });

        // 取消全选稀有度
        elements.deselectAllRarities.addEventListener('click', () => {
            state.selectedRarities.clear();
            renderRarityButtons();
            updateSelectionInfo();
        });

        // 全选类型
        elements.selectAllTypes.addEventListener('click', () => {
            state.selectedTypes = new Set(state.availableTypes);
            renderTypeButtons();
            updateSelectionInfo();
        });

        // 取消全选类型
        elements.deselectAllTypes.addEventListener('click', () => {
            state.selectedTypes.clear();
            renderTypeButtons();
            updateSelectionInfo();
        });

        // 生成按钮点击
        elements.generateBtn.addEventListener('click', generateLoot);

        // 回车键触发生成
        elements.quantityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !elements.generateBtn.disabled) {
                generateLoot();
            }
        });

        // ==================== 初始化 ====================

        /**
         * 应用初始化
         */
        async function init() {
            // 初始渲染按钮
            renderRarityButtons();
            renderTypeButtons();
            updateSelectionInfo();
            
            // 加载词库列表
            await loadLibraries();
        }

        // 启动应用
        init();
    </script>
</body>
</html>
